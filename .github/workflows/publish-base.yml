name: Publish base image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override (defaults to git tag)"
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: robfischer1/mnemosyne-core-base

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Checkout mnemosyne-schema (private)
        uses: actions/checkout@v4
        with:
          repository: robfischer1/mnemosyne-schema
          path: _schema
          token: ${{ secrets.SCHEMA_REPO_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          build-contexts: mnemosyne_schema=_schema
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify base image
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            python -c "
          import mnemosyne_core
          from pathlib import Path
          d = Path('/app/schema')
          assert d.is_dir(), 'schema dir missing'
          tomls = list(d.glob('*.toml'))
          assert tomls, 'no schema files'
          print(f'OK: mnemosyne-core {mnemosyne_core.__version__}, {len(tomls)} schema files')
          "
