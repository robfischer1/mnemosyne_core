
# Per-service Docker Compose stack for mnemosyne-core (nas01).
# State (if any) externalizes to a named volume or the nas01 Postgres by URL —
# add a `volumes:` mount and a DATABASE_URL env when the service becomes stateful.
services:
  mnemosyne-core:
    image: ghcr.io/robfischer1/mnemosyne-core:latest
    build: .
    environment:
      PORT: "8201"
      HOST: "0.0.0.0"
    ports:
      - "8201:8201"
    restart: unless-stopped
